<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Command Bar Popup</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" />
    <link rel="stylesheet" href="shadow-overlay.css" />
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 800px;
        height: 500px;
        background: transparent;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <script src="js/popup-init.js"></script>
    <script src="js/dom.js"></script>
    <script src="js/popup-utils-bridge.js"></script>
    <script src="js/customTitles.js"></script>
    <script src="js/renameHelper.js"></script>
    <script src="js/datedLinks.js"></script>
    <script src="js/date-modal.js"></script>
    <script src="js/folder-selector-modal.js"></script>
    <script src="js/item-context-menu.js"></script>
    <script src="content.js"></script>

    <!-- Hidden date modal (shown on demand) -->
    <div id="prd-stv-date-modal" class="prd-stv-modal" style="display: none;">
      <div class="prd-stv-modal-content prd-stv-date-modal-content">
        <div class="prd-stv-modal-header">
          <h3>Add Date</h3>
          <button class="prd-stv-modal-close" id="prd-stv-date-modal-close" aria-label="Close">
            ×
          </button>
        </div>
        <div class="prd-stv-modal-body">
          <p id="prd-stv-date-item-title" style="margin-bottom: 12px; color: #f5f5f5;"></p>
          <div id="prd-stv-calendar-container">
            <div class="prd-stv-calendar-header">
              <button class="prd-stv-calendar-nav" id="prd-stv-calendar-prev" aria-label="Previous month">‹</button>
              <div class="prd-stv-calendar-month-year" id="prd-stv-calendar-month-year"></div>
              <button class="prd-stv-calendar-nav" id="prd-stv-calendar-next" aria-label="Next month">›</button>
            </div>
            <div class="prd-stv-calendar-weekdays">
              <div>Su</div><div>Mo</div><div>Tu</div><div>We</div><div>Th</div><div>Fr</div><div>Sa</div>
            </div>
            <div class="prd-stv-calendar-days" id="prd-stv-calendar-days"></div>
          </div>
        </div>
        <div class="prd-stv-modal-footer">
          <button class="prd-stv-modal-btn prd-stv-modal-btn-secondary" id="prd-stv-date-cancel">Cancel</button>
          <button class="prd-stv-modal-btn prd-stv-modal-btn-primary" id="prd-stv-date-save" disabled>Save</button>
        </div>
      </div>
    </div>
  </body>
</html>
